services:
  db:
    image: postgres:16
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./movies_dump.sql:/docker-entrypoint-initdb.d/dump.sql:ro
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms200m -Xmx200m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 10

  etl:
    build: .
    volumes:
      - ./state.json:/app/state.json
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - ELASTIC_HOST=es
    depends_on:
      db:
        condition: service_healthy
      es:
        condition: service_healthy
    command: >
      sh -c "python -m etl.create_index && python -m etl.main"
    restart: always